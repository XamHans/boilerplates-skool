allowBuilds:
  '@tsparticles/engine': true
  better-sqlite3: true
  bufferutil: true
  esbuild: true
  msw: true
  protobufjs: true
  sharp: true

# Don't re-run `pnpm install` before every `pnpm run` script. The pre-run
# dependency check would otherwise block `pnpm test` on the harmless
# "ignored build scripts" notice for optional native transitive deps.
verifyDepsBeforeRun: false
